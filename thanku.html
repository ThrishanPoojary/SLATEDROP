<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Thrishan Poojary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
        }
        .accent-text {
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6 hero-gradient relative overflow-hidden">
    
    <div class="max-w-md w-full glass-card rounded-3xl p-10 text-center relative z-10">
        <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-8">
            <i data-lucide="check-circle" class="text-green-400 w-10 h-10"></i>
        </div>
        
        <h1 class="text-3xl font-bold text-white mb-4">Message Received!</h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            Thank you for reaching out, Thrishan will get back to you as soon as possible.
        </p>
        
        <a href="portfolio.html" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Portfolio
        </a>
    </div>

    <!-- Watermark -->
    <div class="absolute bottom-6 right-6 opacity-30 select-none">
        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500">
            Designed by Pratheek Designs
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
